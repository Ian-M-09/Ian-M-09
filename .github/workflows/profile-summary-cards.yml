name: GitHub-Profile-Summary-Cards

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-summary-cards
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3
      - uses: vn7n24fzkq/github-profile-summary-cards@release
        with:
          USERNAME: Ian-M-09
          # El parámetro correcto es BRANCH_NAME si querés especificar dónde guardar
          # Pero por defecto la acción intentará hacer Auto-Push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
